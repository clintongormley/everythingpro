name: Tests

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - ha-version: "2025.2.0"
            python-version: "3.13"
          - ha-version: "stable"
            python-version: "3.14"
          - ha-version: "dev"
            python-version: "3.14"
    name: "Python (HA ${{ matrix.ha-version }})"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install HA
        run: |
          if [ "${{ matrix.ha-version }}" = "dev" ]; then
            pip install git+https://github.com/home-assistant/core.git
          elif [ "${{ matrix.ha-version }}" = "stable" ]; then
            pip install homeassistant
          else
            pip install homeassistant==${{ matrix.ha-version }}
          fi
      - name: Install integration requirements
        run: pip install aioesphomeapi>=29.0.0
      - name: Install test dependencies
        run: pip install -r requirements_test.txt
      - name: Ruff lint
        run: ruff check custom_components/ tests/
      - name: Ruff format
        run: ruff format --check custom_components/ tests/
      - name: Pytest
        run: pytest tests/ --cov=custom_components/everything_presence_pro --cov-report=xml -v

  frontend:
    runs-on: ubuntu-latest
    name: Frontend
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Biome lint
        run: npx biome check src/ --diagnostic-level=error
      - name: Vitest
        run: npx vitest run
